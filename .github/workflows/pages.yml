name: Deploy academic homepage

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build static site
        run: |
          mkdir -p site
          cp index.html styles.css cv.html site/
          base64 --decode Enze-Sun-CV.pdf.b64 > site/Enze-Sun-CV.pdf
          touch site/.nojekyll

      - name: Verify original CV PDF
        run: echo "603ae7509822287a6e7c59acb2797c3a5d69b6ed7da28e820714058bfa661e6c  site/Enze-Sun-CV.pdf" | sha256sum --check -

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
